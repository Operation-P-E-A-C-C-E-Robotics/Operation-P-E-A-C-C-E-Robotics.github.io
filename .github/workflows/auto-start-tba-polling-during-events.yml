name: Auto-start TBA polling during events

on:
    schedule:
        - cron: '0 11 * * *'  # 6 AM ET (11 AM UTC)
    workflow_dispatch:

jobs:
    check-tba-event:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.x'

            - name: Install dependencies
              run: pip install requests

            - name: Check for active TBA events
              run: python checkActiveComps.py
              env:
                  TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}